<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Swifta NSD Index</title>
    <style>
      :root {
        --line: #22364d;
        --page: #d9e0e7;
        --panel: #f6f1e1;
        --panel-2: #fffdf8;
        --text: #112033;
        --muted: #5f6e7c;
        --blue: #1676dc;
        --blue-dark: #0b57ae;
        --shadow: 0 18px 40px rgba(21, 34, 52, 0.18);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #e3e8ee 0%, var(--page) 100%);
      }
      .window {
        max-width: 1120px;
        margin: 0 auto;
        border: 2px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
      }
      .titlebar {
        padding: 8px 14px;
        color: #ffffff;
        font-size: 18px;
        font-weight: 700;
        background: linear-gradient(180deg, #3394ff 0%, var(--blue) 48%, var(--blue-dark) 100%);
      }
      .body {
        padding: 16px;
      }
      .meta {
        margin: 0 0 14px;
        color: var(--muted);
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel-2);
      }
      th, td {
        padding: 10px 12px;
        border: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }
      th {
        color: #ffffff;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: linear-gradient(180deg, var(--blue) 0%, var(--blue-dark) 100%);
      }
      td:nth-child(2) {
        width: 110px;
        text-align: center;
        white-space: nowrap;
      }
      a {
        color: #0f58ad;
        text-decoration: none;
        font-weight: 700;
      }
      a:hover {
        text-decoration: underline;
      }
      @media (max-width: 800px) {
        body { padding: 12px; }
        .body { padding: 10px; }
        table, thead, tbody, tr, th, td {
          display: block;
        }
        thead {
          display: none;
        }
        tr {
          margin-bottom: 12px;
          border: 1px solid var(--line);
          background: var(--panel-2);
        }
        td {
          border: 0;
          border-top: 1px solid var(--line);
        }
        td:first-child {
          border-top: 0;
        }
        td:nth-child(2) {
          width: auto;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="titlebar">Swifta NSD Index</div>
      <div class="body">
        <p class="meta">/Volumes/External/Code/tlapa/tests/fixtures</p>
        <table>
          <thead>
            <tr>
              <th>Source</th>
              <th>Functions</th>
              <th>Names</th>
            </tr>
          </thead>
          <tbody>
            <tr><td><a href="control_flow.nassi.html">control_flow.swift</a></td><td>2</td><td>score, MathBox.normalize</td></tr><tr><td><a href="invalid.nassi.html">invalid.swift</a></td><td>0</td><td>No functions found</td></tr><tr><td><a href="valid.nassi.html">valid.swift</a></td><td>3</td><td>User.rename, User.greeting, makeUser</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
