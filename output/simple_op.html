<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NSD — Simple</title>
<style>
:root{--bg:#0d1117;--tx:#e6edf3;--accent:#58a6ff;--mono:"JetBrains Mono","Fira Code",monospace}
body{background:var(--bg);color:var(--tx);font-family:var(--mono);padding:24px;margin:0}
h1{font-size:20px;border-bottom:1px solid #30363d;padding-bottom:8px}
.operator{margin:24px 0 32px 0}
h2{font-size:15px;color:var(--accent);margin:0 0 8px 0}
h2 .line{color:#8b949e;font-weight:normal;font-size:12px}
svg{display:block;max-width:100%}
</style>
</head>
<body>
<h1>NSD: Simple</h1>
<p>1 operator definitions &middot; 0 diagnostics</p>
<div class="operator"><h2>Foo <span class="line">line 2</span></h2><svg xmlns="http://www.w3.org/2000/svg" width="800" height="66" viewBox="0 0 800 66">
<rect width="100%" height="100%" fill="#0d1117" rx="8"/>
<rect x="20" y="16" width="760" height="30" rx="4" ry="4" fill="#161b22" stroke="#30363d" stroke-width="1"/><text x="400.0" y="35.2" text-anchor="middle" fill="#e6edf3" font-family="JetBrains Mono,Fira Code,monospace" font-size="12" font-weight="normal">1</text>
</svg></div>
</body>
</html>
