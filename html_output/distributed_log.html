}
.diags summary{

  font-size: 14px;
}
.diags table{
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 8px;
}
.diags th,.diags td{
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--bd);
}
.diags th{
  background: rgba(86, 156, 214, 0.15);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.sev{
  color: var(--red);
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
}
.more-info{
  color: var(--tm);
  font-style: italic;
  text-align: center;
}
svg{
  display: block;
  border: 1px solid var(--bd);
  border-radius: 8px;
  width: 100%;
  max-width: 640px;
  background: var(--bg);
}
