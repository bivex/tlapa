:root{

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family: "JetBrains Mono", "Fira Code", monospace;
  background: var(--bg);
  color: var(--tx);
  padding: 24px;
  max-width: 960px;
  margin: 0 auto;
}
.hdr{
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--bd);
}
.hdr h1{
  font-size: 22px;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 6px;
}
.hdr .meta{
  font-size: 13px;
  color: var(--tm);
  font-family: "JetBrains Mono", monospace;
}
.summary{
  font-size: 14px;
  color: var(--tm);
  margin-bottom: 20px;
  line-height: 1.6;
}
.diags{
  margin-bottom: 20px;
  background: var(--sf);
  border: 1px solid var(--bd);
  border-radius: 8px;
  padding: 12px;
}
.diags summary{
  cursor: pointer;
  color: var(--orange);
  font-weight: 600;
  font-size: 14px;
}
.diags table{
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 8px;
}
.diags th,.diags td{
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--bd);
}
.diags th{
  background: rgba(86, 156, 214, 0.15);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.05em;
}
.sev{
  color: var(--red);
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
}
.more-info{
  color: var(--tm);
  font-style: italic;
  text-align: center;
}
svg{
  display: block;
  border: 1px solid var(--bd);
  border-radius: 8px;
  width: 100%;
  max-width: 640px;
  background: var(--bg);
}
</style>
